services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    image: mariadb
    env_file: 
      - .env
    secrets:
      - db_user_password
      - db_root_password
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root --password=$(cat /run/secrets/db_root_password) -e 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    image: wordpress
    env_file:
      - .env
    secrets:
      - db_user_password
      - wp_user_password
      - wp_admin_password
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    restart: on-failure
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
  
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    image: nginx
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    ports:
      - "443:443"
    networks:
      - inception
    restart: on-failure
    depends_on:
      - wordpress

  redis:
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    image: redis
    networks:
      - inception
    restart: on-failure

  ftp:
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    container_name: ftp
    image: ftp
    env_file:
      - .env
    secrets:
      - ftp_user_password
    volumes:
      - wordpress:/home/wordpress
    networks:
      - inception
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    restart: on-failure
    privileged: true
    depends_on:
      - wordpress

  adminer:
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    container_name: adminer
    image: adminer
    networks:
      - inception
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      mariadb:
        condition: service_healthy

  gitea:
    build:
      context: ./requirements/bonus/gitea
      dockerfile: Dockerfile
    container_name: gitea
    image: gitea
    env_file:
      - .env
    secrets:
      - gitea_admin_password
    volumes:
      - gitea:/var/lib/gitea
      - gitea_config:/etc/gitea
    networks:
      - inception
    ports:
      - "3000:3000"
    restart: on-failure

secrets:
  db_user_password:
    file: ../secrets/db_user_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  ftp_user_password:
    file: ../secrets/ftp_user_password.txt
  gitea_admin_password:
    file: ../secrets/gitea_admin_password.txt

volumes:
  db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/db
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress
  gitea:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/gitea
  gitea_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/gitea_config

networks:
  inception:
    driver: bridge
    name: inception
