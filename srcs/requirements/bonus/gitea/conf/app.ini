APP_NAME	= Gitea
RUN_USER	= git
RUN_MODE	= prod
WORK_PATH	= /var/lib/gitea

[database]
DB_TYPE	= sqlite3
PATH	= /var/lib/gitea/data/gitea.db

[repository]
ROOT = /var/lib/gitea/repositories

[server]
HTTP_ADDR = 0.0.0.0
HTTP_PORT = 3000
ROOT_URL  = http://localhost:3000/

[security]
INSTALL_LOCK = true
SECRET_KEY   = inception42

[log]
MODE  = console
LEVEL = info